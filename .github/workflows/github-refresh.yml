name: github-refresh

on:
  schedule:
    - cron: "20 6 * * 1" # Mondays 06:20 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install indexer
        working-directory: indexer
        run: pip install -e .
      - name: Regenerate knowledge/github
        working-directory: indexer
        run: python -m indexer.github_refresh
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/github/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: weekly GitHub knowledge refresh"
            git push
          fi
