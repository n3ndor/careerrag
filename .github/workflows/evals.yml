name: evals

on:
  schedule:
    - cron: "40 6 * * 1" # Mondays 06:40 UTC, after the knowledge refresh
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install httpx
        run: pip install httpx
      - name: Run eval suite against production
        env:
          CAREERRAG_EVAL_TOKEN: ${{ secrets.CAREERRAG_EVAL_TOKEN }}
        run: python evals/run_evals.py
      - name: Commit results (also on gate failure, honest numbers)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evals/RESULTS.md
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: eval run results"
            git push
          fi
